table:
  name: milestones
  schema: public
select_permissions:
  - role: admin
    permission:
      columns: "*"
      filter: {}
      allow_aggregations: true
  - role: guest
    permission:
      columns:
        - id
        - event_id
        - label
        - trigger_count
        - sort_order
      filter:
        event_id:
          _eq: X-Hasura-Event-Id
insert_permissions:
  - role: admin
    permission:
      check: {}
      columns: "*"
update_permissions:
  - role: admin
    permission:
      columns: "*"
      filter: {}
      check: null
delete_permissions:
  - role: admin
    permission:
      filter: {}
