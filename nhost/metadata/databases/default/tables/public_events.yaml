table:
  name: events
  schema: public
object_relationships:
  - name: client
    using:
      foreign_key_constraint_on: client_id
array_relationships:
  - name: media
    using:
      foreign_key_constraint_on:
        column: event_id
        table:
          name: media
          schema: public
  - name: guest_sessions
    using:
      foreign_key_constraint_on:
        column: event_id
        table:
          name: guest_sessions
          schema: public
  - name: challenges
    using:
      foreign_key_constraint_on:
        column: event_id
        table:
          name: challenges
          schema: public
select_permissions:
  - role: admin
    permission:
      columns: "*"
      filter: {}
      allow_aggregations: true
insert_permissions:
  - role: admin
    permission:
      check: {}
      columns: "*"
update_permissions:
  - role: admin
    permission:
      columns: "*"
      filter: {}
      check: null
delete_permissions:
  - role: admin
    permission:
      filter: {}
