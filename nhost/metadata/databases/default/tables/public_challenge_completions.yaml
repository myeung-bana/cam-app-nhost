table:
  name: challenge_completions
  schema: public
object_relationships:
  - name: guest_session
    using:
      foreign_key_constraint_on: session_id
select_permissions:
  - role: admin
    permission:
      columns: "*"
      filter: {}
      allow_aggregations: true
  - role: guest
    permission:
      columns:
        - id
        - challenge_id
        - session_id
        - media_id
        - completed_at
      filter:
        guest_session:
          nhost_user_id:
            _eq: X-Hasura-User-Id
insert_permissions:
  - role: admin
    permission:
      check: {}
      columns: "*"
  - role: guest
    permission:
      check:
        guest_session:
          nhost_user_id:
            _eq: X-Hasura-User-Id
      columns:
        - challenge_id
        - session_id
        - media_id
update_permissions:
  - role: admin
    permission:
      columns: "*"
      filter: {}
      check: null
delete_permissions:
  - role: admin
    permission:
      filter: {}
